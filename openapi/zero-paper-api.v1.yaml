              - accepted
              - status
              - reason
              - request
              - request_hash
              - receipt_hash
            additionalProperties: true
        receipts_hash:
          type: string
          pattern: "^sha256:"
      additionalProperties: true
    LiveControlResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        reason:
          type: string
      additionalProperties: true
    LiveFlattenResponse:
      type: object
      required: [ok, orders]
      properties:
        ok:
          type: boolean
        reason:
          type: string
        orders:
          type: array
          items:
            $ref: "#/components/schemas/ExecuteResponse"
      additionalProperties: true
