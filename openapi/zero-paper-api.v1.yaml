          required: [status, algorithm, signature, signer, signed_evidence_hash, key_material_included]
          additionalProperties: true
      additionalProperties: true
    LiveExecutionReceiptsResponse:
      type: object
      required:
        - schema_version
        - generated_at
        - mode
        - operator_context
        - summary
        - receipts
        - privacy
        - receipts_hash
      properties:
        schema_version:
          const: zero.live_execution_receipts.v1
        generated_at:
          type: string
          format: date-time
        mode:
          type: string
        receipts:
          type: array
          items:
