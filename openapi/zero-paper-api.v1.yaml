openapi: 3.1.0
info:
  title: ZERO Paper API
  version: 0.1.1
  summary: Local paper runtime and operator API for ZERO.
  description: |
    ZERO Paper API is the public local runtime contract for paper-first,
    self-custodial onchain operations. It requires no exchange credentials by
    default. Live execution is local opt-in and is refused unless local custody,
    journal, risk, and emergency preflight checks pass.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
servers:
  - url: http://127.0.0.1:8765
    description: Local paper runtime
tags:
  - name: runtime
  - name: operator
  - name: paper
  - name: audit
  - name: network
  - name: intelligence
  - name: live
  - name: market
paths:
  /:
    get:
      tags: [runtime]
      operationId: getRoot
      summary: Runtime version probe.
      responses:
        "200":
          description: Runtime identity and status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
  /health:
    get:
      tags: [runtime]
      operationId: getHealth
      summary: Health, dependency, circuit breaker, and recovery state.
      responses:
        "200":
          description: Runtime health packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v2/status:
    get:
      tags: [operator]
      operationId: getV2Status
      summary: Operator status summary consumed by the CLI.
      responses:
        "200":
          description: Operator status packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V2StatusResponse"
  /positions:
    get:
      tags: [operator]
      operationId: getPositions
      summary: Current paper positions.
      responses:
        "200":
          description: Position list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionsResponse"
  /risk:
    get:
      tags: [operator]
      operationId: getRisk
      summary: Current risk state.
      responses:
        "200":
          description: Risk state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskResponse"
  /brief:
    get:
      tags: [operator]
      operationId: getBrief
      summary: Compact operator brief.
      responses:
        "200":
          description: Brief packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BriefResponse"
  /regime:
    get:
      tags: [operator]
      operationId: getRegime
      summary: Paper regime readout.
      parameters:
        - $ref: "#/components/parameters/CoinQuery"
      responses:
        "200":
          description: Regime packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegimeResponse"
  /evaluate/{coin}:
    get:
      tags: [paper]
      operationId: evaluateCoin
      summary: Evaluate a paper setup for one coin.
      parameters:
        - name: coin
          in: path
          required: true
          schema:
            type: string
            example: BTC
      responses:
        "200":
          description: Evaluation packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/Unavailable"
  /pulse:
    get:
      tags: [operator]
      operationId: getPulse
      summary: Recent decision events.
      parameters:
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Recent event packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PulseResponse"
  /approaching:
    get:
      tags: [operator]
      operationId: getApproaching
      summary: Gates or limits the operator is approaching.
      responses:
        "200":
          description: Approaching packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproachingResponse"
  /rejections:
    get:
      tags: [paper]
      operationId: getRejections
      summary: Recent rejected paper decisions.
      parameters:
        - $ref: "#/components/parameters/CoinQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Rejection list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectionsResponse"
  /journal:
    get:
      tags: [audit]
      operationId: getJournal
      summary: Recent paper decision journal records.
      parameters:
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Journal tail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalResponse"
  /memory:
    get:
      tags: [audit]
      operationId: getMemory
      summary: Public-safe local memory snapshot.
      parameters:
        - $ref: "#/components/parameters/LimitQuery"
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json, md]
      responses:
        "200":
          description: Redacted memory state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySnapshotResponse"
  /genesis:
    get:
      tags: [audit]
      operationId: getGenesis
      summary: Plan-only genesis proposal classifications.
      responses:
        "200":
          description: Genesis proposal snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenesisSnapshotResponse"
  /metrics:
    get:
      tags: [audit]
      operationId: getMetrics
      summary: Runtime counters and recovery metrics.
      responses:
        "200":
          description: Metrics packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
  /immune:
    get:
      tags: [runtime]
      operationId: getImmune
      summary: Risk-blocking immune and circuit-breaker state.
      responses:
        "200":
          description: Immune breaker packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImmuneResponse"
  /audit/export:
    get:
      tags: [audit]
      operationId: getAuditExport
      summary: Structured audit export for a paper session.
      parameters:
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Audit export.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditExportResponse"
  /deployment/claim:
    get:
      tags: [network]
      operationId: getDeploymentClaim
      summary: Public-safe local deployment identity claim.
      responses:
        "200":
          description: Signature-ready deployment claim packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentClaimResponse"
  /deployment/heartbeat:
    get:
      tags: [network]
      operationId: getDeploymentHeartbeat
      summary: Public-safe local deployment heartbeat and liveness packet.
      responses:
        "200":
          description: Signature-ready deployment heartbeat packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentHeartbeatResponse"
  /network/profile:
    get:
      tags: [network]
      operationId: getNetworkProfile
      summary: Public-safe local ZERO Network profile packet.
      responses:
        "200":
          description: Public profile packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkProfileResponse"
  /network/leaderboard:
    get:
      tags: [network]
      operationId: getNetworkLeaderboard
      summary: Public-safe local leaderboard row.
      responses:
        "200":
          description: Local leaderboard packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkLeaderboardResponse"
  /network/publish:
    post:
      tags: [network]
      operationId: publishNetworkProfile
      summary: Append a redacted profile packet to a local proof log.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NetworkPublishRequest"
      responses:
        "200":
          description: Publish result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalExportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /network/ingest:
    post:
      tags: [network]
      operationId: ingestNetworkProfiles
      summary: Validate redacted profile packets with hosted-style anti-gaming rules.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NetworkIngestRequest"
      responses:
        "200":
          description: Ingestion decision packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkIngestionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /intelligence/snapshot:
    get:
      tags: [intelligence]
      operationId: getIntelligenceSnapshot
      summary: Delayed public ZERO Intelligence snapshot.
      responses:
        "200":
          description: Delayed aggregate intelligence packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceSnapshotResponse"
  /intelligence/catalog:
    get:
      tags: [intelligence]
      operationId: getIntelligenceCatalog
      summary: Public catalog for commercial ZERO Intelligence surfaces.
      responses:
        "200":
          description: Intelligence catalog.
          content:
            application/json:
            schema:
              $ref: "#/components/schemas/IntelligenceCatalogResponse"
  /intelligence/commercial:
    get:
      tags: [intelligence]
      operationId: getIntelligenceCommercial
      summary: Billing-ready commercial ZERO Intelligence API contract.
      responses:
        "200":
          description: Commercial API boundary, scopes, plans, usage events, and privacy contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceCommercialResponse"
  /intelligence/model-gateway:
    get:
      tags: [intelligence]
      operationId: getIntelligenceModelGateway
      summary: Public-safe model gateway provider and fail-closed routing status.
      responses:
        "200":
          description: Model gateway status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelGatewayStatusResponse"
  /intelligence/model-gateway/health:
    get:
      tags: [intelligence]
      operationId: getIntelligenceModelGatewayHealth
      summary: Public-safe model gateway health probe.
      parameters:
        - name: network
          in: query
          required: false
          description: Run an explicit provider network probe when true.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Model gateway health packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelGatewayHealthResponse"
  /intelligence/model-gateway/audit:
    get:
      tags: [intelligence]
      operationId: getIntelligenceModelGatewayAudit
      summary: Public-safe model gateway audit bundle.
      responses:
        "200":
          description: Model gateway audit bundle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelGatewayAuditResponse"
  /intelligence/export:
    post:
      tags: [intelligence]
      operationId: exportIntelligenceSnapshot
      summary: Append a delayed intelligence snapshot to a local export log.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsentRequest"
      responses:
        "200":
          description: Export result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalExportResponse"
  /v1/intelligence/snapshots:
    get:
      tags: [intelligence]
      operationId: getHostedIntelligenceSnapshots
      summary: Hosted-compatible snapshot feed with public delayed access and paid realtime scope.
      parameters:
        - name: freshness
          in: query
          required: false
          schema:
            type: string
            enum: [delayed, realtime]
            default: delayed
      responses:
        "200":
          description: Hosted-compatible snapshot feed response.
          headers:
            x-zero-ratelimit-limit:
              schema: { type: string }
            x-zero-ratelimit-remaining:
              schema: { type: string }
            x-zero-ratelimit-reset:
              schema: { type: string }
            x-zero-ratelimit-policy:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceResponse"
        "401":
          description: Missing or invalid token for paid freshness.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceErrorResponse"
        "403":
          description: Token does not grant the requested scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceErrorResponse"
  /v1/intelligence/history:
    get:
      tags: [intelligence]
      operationId: getHostedIntelligenceHistory
      summary: Hosted-compatible historical intelligence query.
      responses:
        "200":
          description: Hosted-compatible history response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceResponse"
        "401":
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceErrorResponse"
        "403":
          description: Token does not grant the requested scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceErrorResponse"
  /v1/intelligence/cohorts:
    get:
      tags: [intelligence]
      operationId: getHostedIntelligenceCohorts
      summary: Hosted-compatible cohort analytics query.
      responses:
        "200":
          description: Hosted-compatible cohort response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceResponse"
        "401":
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceErrorResponse"
        "403":
          description: Token does not grant the requested scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceErrorResponse"
  /v1/intelligence/benchmarks:
    get:
      tags: [intelligence]
      operationId: getHostedIntelligenceBenchmarks
      summary: Hosted-compatible benchmark analytics query.
      responses:
        "200":
          description: Hosted-compatible benchmark response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceResponse"
        "401":
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceErrorResponse"
        "403":
          description: Token does not grant the requested scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceErrorResponse"
  /v1/intelligence/webhooks:
    post:
      tags: [intelligence]
      operationId: createHostedIntelligenceWebhook
      summary: Hosted-compatible webhook subscription and signature fixture.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostedIntelligenceWriteRequest"
      responses:
        "200":
          description: Hosted-compatible webhook subscription response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceResponse"
        "401":
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceErrorResponse"
        "403":
          description: Token does not grant the requested scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceErrorResponse"
  /v1/intelligence/exports:
    post:
      tags: [intelligence]
      operationId: createHostedIntelligenceExport
      summary: Hosted-compatible bulk export job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostedIntelligenceWriteRequest"
      responses:
        "200":
          description: Hosted-compatible export job response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceResponse"
        "401":
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceErrorResponse"
        "403":
          description: Token does not grant the requested scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedIntelligenceErrorResponse"
  /hl/status:
    get:
      tags: [market]
      operationId: getHyperliquidStatus
      summary: Hyperliquid read-only market status.
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        "200":
          description: Disabled metadata or read-only Hyperliquid status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HyperliquidStatusResponse"
  /hl/account:
    get:
      tags: [market]
      operationId: getHyperliquidAccount
      summary: Hyperliquid read-only account snapshot.
      responses:
        "200":
          description: Normalized read-only account truth.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HyperliquidAccountResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /hl/reconcile:
    get:
      tags: [market]
      operationId: getHyperliquidReconciliation
      summary: Local runtime versus Hyperliquid account reconciliation.
      responses:
        "200":
          description: Reconciliation packet used by live risk gates.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HyperliquidReconciliationResponse"
  /market/quote:
    get:
      tags: [market]
      operationId: getMarketQuote
      summary: Active quote source used by paper execution.
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
            example: BTC
      responses:
        "200":
          description: Quote packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketQuoteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/Unavailable"
  /operator/state:
    get:
      tags: [operator]
      operationId: getOperatorState
      summary: Operator friction state consumed by the terminal.
      responses:
        "200":
          description: Operator state packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorStateResponse"
  /operator/context:
    get:
      tags: [operator]
      operationId: getOperatorContext
      summary: Current operator audit identity.
      parameters:
        - name: X-Zero-Operator-Id
          in: header
          required: false
          schema:
            type: string
        - name: X-Zero-Operator-Handle
          in: header
          required: false
          schema:
            type: string
        - name: X-Zero-Operator-Role
          in: header
          required: false
          schema:
            type: string
        - name: X-Zero-Operator-Scope
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Operator context packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorContextResponse"
  /operator/events:
    post:
      tags: [operator]
      operationId: postOperatorEvents
      summary: Submit local operator events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Accepted event count and current operator snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorEventsResponse"
  /execute:
    post:
      tags: [paper, live]
      operationId: postExecute
      summary: Submit a paper order, or live order when X-Zero-Mode is live.
      parameters:
        - name: X-Zero-Mode
          in: header
          required: false
          schema:
            type: string
            enum: [paper, live]
            default: paper
        - name: X-Zero-Expose-Trace
          in: header
          required: false
          schema:
            type: string
            enum: ["true", "false"]
            default: "false"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteRequest"
      responses:
        "200":
          description: Paper fill/refusal or live submission/refusal.
          headers:
            X-Zero-Trace-Id:
              $ref: "#/components/headers/TraceId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/Unavailable"
  /auto/toggle:
    post:
      tags: [operator]
      operationId: postAutoToggle
      summary: Toggle local simulated automation state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
              additionalProperties: false
      responses:
        "200":
          description: Toggle result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoToggleResponse"
  /live/preflight:
    get:
      tags: [live]
      operationId: getLivePreflight
      summary: Non-secret local live-readiness gate.
      responses:
        "200":
          description: Live preflight packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivePreflightResponse"
  /live/cockpit:
    get:
      tags: [live]
      operationId: getLiveCockpit
      summary: Consolidated read-only live operator cockpit packet.
      responses:
        "200":
          description: Live cockpit packet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveCockpitResponse"
  /live/certification:
    get:
      tags: [live]
      operationId: getLiveCertification
      summary: Dry-run live execution certification harness.
      responses:
        "200":
          description: Certification drills and evidence requirements.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveCertificationResponse"
  /live/receipts:
    get:
      tags: [live]
      operationId: getLiveReceipts
      summary: Public-safe local live execution receipt bundle.
      responses:
        "200":
          description: Execution receipts with hashed local tokens and venue acknowledgement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveExecutionReceiptsResponse"
  /live/evidence:
    get:
      tags: [live]
      operationId: getLiveEvidence
      summary: Public-safe signed live-readiness evidence packet.
      responses:
        "200":
          description: Hash-only canary evidence bundle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveEvidenceResponse"
  /live/heartbeat:
    post:
      tags: [live]
      operationId: postLiveHeartbeat
      summary: Refresh local live dead-man heartbeat.
      responses:
        "200":
          $ref: "#/components/responses/LiveControl"
  /live/pause:
    post:
      tags: [live]
      operationId: postLivePause
      summary: Pause local live entry control.
      responses:
        "200":
          $ref: "#/components/responses/LiveControl"
  /live/resume:
    post:
      tags: [live]
      operationId: postLiveResume
      summary: Resume local live entry control.
      responses:
        "200":
          $ref: "#/components/responses/LiveControl"
  /live/kill:
    post:
      tags: [live]
      operationId: postLiveKill
      summary: Engage local live kill switch and cancel open orders.
      responses:
        "200":
          $ref: "#/components/responses/LiveControl"
  /live/flatten:
    post:
      tags: [live]
      operationId: postLiveFlatten
      summary: Submit reduce-only flatten orders for local live positions.
      responses:
        "200":
          description: Flatten result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveFlattenResponse"
components:
  parameters:
    CoinQuery:
      name: coin
      in: query
      required: false
      schema:
        type: string
        example: BTC
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 50
  headers:
    TraceId:
      description: Per-request trace ID generated by the local runtime.
      schema:
        type: string
        pattern: "^trace-[a-f0-9]{16}$"
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unavailable:
      description: Runtime dependency unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    LiveControl:
      description: Live control result.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LiveControlResponse"
  schemas:
    RootResponse:
      type: object
      required: [name, version, status, ts]
      properties:
        name:
          type: string
          const: zero-paper-engine
        version:
          type: string
        status:
          type: string
          const: ok
        ts:
          type: string
