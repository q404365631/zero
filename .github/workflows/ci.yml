name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        working-directory: engine
        run: python -m pip install -e ".[dev]"
      - name: Lint
        working-directory: engine
        run: ruff check .
      - name: Test
        working-directory: engine
        run: pytest

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Format
        working-directory: cli
        run: cargo fmt --all --check
      - name: Test
        working-directory: cli
        run: cargo test --workspace
