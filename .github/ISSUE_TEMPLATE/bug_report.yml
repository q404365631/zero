name: Bug report
description: Report a reproducible bug
title: "bug: "
labels: ["bug", "needs triage"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - paper-mode bug
        - docs or examples bug
        - operator UX bug
        - safety-critical bug
        - security-sensitive bug
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Rust version, ZERO version or commit.
    validations:
      required: true
  - type: textarea
    id: safety_impact
    attributes:
      label: Safety Impact
      description: Does this affect paper/live mode boundaries, operator friction, risk, secrets, or public proof privacy?
      value: "No known safety impact."
    validations:
      required: true
