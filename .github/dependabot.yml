version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
  - package-ecosystem: pip
    directory: /engine
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    groups:
      python:
        patterns:
          - "*"
    labels:
      - dependencies
      - python
  - package-ecosystem: cargo
    directory: /cli
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    groups:
      rust:
        patterns:
          - "*"
    labels:
      - dependencies
      - rust
